name: CI

# Triggers: push to main, and PRs targeting main or any feature branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "feature/**"]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only token; no write actions performed.
permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # WHY uv instead of pip: pip's resolver backtracks for minutes on the
      # transitive cohere / logfire / opentelemetry-* deps pulled in by
      # arize-phoenix. uv resolves the same set in seconds and ships its own
      # caching that's faster than setup-python's pip cache for this graph.
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest-cov

      # WHY cache HF models: BgeEmbedder (~120MB) and the ms-marco-MiniLM cross-encoder
      # (~80MB) are downloaded on first use. Without this cache, every CI run re-downloads
      # them, wasting ~30s and bandwidth. Cache key is invalidated when requirements.txt
      # changes (which is when transformer versions might shift).
      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-

      # No API keys are set in CI — every LLM call routes to the dummy fallback,
      # so providers raise _ProviderUnavailableError and tests don't depend on
      # real network calls. OTLP traces still try to flush to localhost:6006 and
      # log connection-refused warnings; that's expected and harmless.
      - name: Run pytest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest tests/ -q \
            --cov=src --cov-report=term-missing --cov-report=xml \
            --maxfail=5 --durations=20

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  frontend-build:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
