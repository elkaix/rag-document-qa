# Production compose — built images, no source mounts
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build
#   docker compose -f docker-compose.prod.yml down
#
# Frontend is served via nginx (port 3000) which proxies /api/ to the backend.
# Data persists in a named Docker volume.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - app-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-data:
